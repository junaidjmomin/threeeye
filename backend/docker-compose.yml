services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: thirdeye
      POSTGRES_USER: thirdeye
      POSTGRES_PASSWORD: thirdeye_dev
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thirdeye"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  backend:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes: [".:/app"]

  celery_worker:
    build: .
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: celery -A app.workers.celery_app worker -l info -Q default,scoring,alerts

  celery_beat:
    build: .
    env_file: .env
    depends_on: [redis]
    command: celery -A app.workers.celery_app beat -l info

volumes:
  pgdata:
