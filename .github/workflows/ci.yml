name: CI — Lint & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: thirdeye
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: thirdeye_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check app tests

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://thirdeye:testpassword@localhost:5432/thirdeye_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only
          LLM_PROVIDER: anthropic
          ANTHROPIC_API_KEY: ""
          TESTING: "true"
        run: pytest tests/ -v --tb=short --cov=app --cov-report=xml:coverage.xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend

  frontend-lint-test:
    name: Frontend (eslint + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vendor-guardian

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vendor-guardian/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npm run lint

      - name: Run tests
        run: npm run test -- --reporter=verbose
