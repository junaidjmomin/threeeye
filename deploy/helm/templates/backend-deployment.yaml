apiVersion: apps/v1
kind: Deployment
metadata:
  name: thirdeye-backend
  namespace: {{ .Values.namespace }}
  labels:
    app: thirdeye-backend
    app.kubernetes.io/name: thirdeye
spec:
  replicas: {{ .Values.replicaCount.backend }}
  selector:
    matchLabels:
      app: thirdeye-backend
  template:
    metadata:
      labels:
        app: thirdeye-backend
    spec:
      containers:
        - name: backend
          image: {{ .Values.image.registry }}/{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: thirdeye-config
            - secretRef:
                name: thirdeye-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: {{ .Values.resources.backend.requests.cpu }}
              memory: {{ .Values.resources.backend.requests.memory }}
            limits:
              cpu: {{ .Values.resources.backend.limits.cpu }}
              memory: {{ .Values.resources.backend.limits.memory }}
