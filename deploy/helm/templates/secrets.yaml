# NOTE: In production, use AWS Secrets Manager + External Secrets Operator
# instead of storing secrets in this file.
# This template is a placeholder — populate via CI/CD or ESO.
apiVersion: v1
kind: Secret
metadata:
  name: thirdeye-secrets
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: thirdeye
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.env.DATABASE_URL | quote }}
  REDIS_URL: {{ .Values.env.REDIS_URL | quote }}
  SECRET_KEY: {{ .Values.env.SECRET_KEY | quote }}
  ANTHROPIC_API_KEY: {{ .Values.env.ANTHROPIC_API_KEY | quote }}
